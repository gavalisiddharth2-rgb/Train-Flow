<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Booking - TrainFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo"><i class="fa-solid fa-train"></i> TrainFlow</a>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="trains.html">Trains</a>
            <a href="passengers.html">Passengers</a>
            <a href="tickets.html" class="active">Tickets</a>
            <a href="supervisors.html">Supervisors</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Ticket Bookings</h1>
            <button class="btn btn-primary" onclick="openTicketModal()"><i class="fa-solid fa-plus"></i> Book Ticket</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Ticket ID</th>
                        <th>Passenger Name</th>
                        <th>Train Name</th>
                        <th>Booking Date</th>
                        <th>Seat No.</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ticketsTableBody">
                    <!-- Data populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Book/Edit Ticket Modal -->
    <div id="ticketModal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" onclick="closeModal('ticketModal')">&times;</span>
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Book New Ticket</h2>
            <form id="ticketForm" onsubmit="handleTicketSubmit(event)">
                <input type="hidden" id="Ticket_ID">
                <div class="form-group">
                    <label>Select Passenger</label>
                    <select id="Passenger_ID" required>
                        <!-- Populated dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Train</label>
                    <select id="Train_ID" required>
                        <!-- Populated dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Booking Date</label>
                    <input type="date" id="Booking_Date" required>
                </div>
                <div class="form-group">
                    <label>Seat Number</label>
                    <input type="text" id="Seat_Number" required placeholder="e.g., A1-12">
                </div>
                <div class="form-group" id="statusGroup" style="display: none;">
                    <label>Booking Status</label>
                    <select id="Status">
                        <option value="Confirmed">Confirmed</option>
                        <option value="Waiting">Waiting</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchTickets();
            loadDropdowns();
        });
    </script>
</body>
</html>
