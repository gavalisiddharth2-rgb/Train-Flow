<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Supervisors - TrainFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo"><i class="fa-solid fa-train"></i> TrainFlow</a>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="trains.html">Trains</a>
            <a href="passengers.html">Passengers</a>
            <a href="tickets.html">Tickets</a>
            <a href="supervisors.html" class="active">Supervisors</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Technical Supervisors</h1>
            <button class="btn btn-primary" onclick="openSupervisorModal()"><i class="fa-solid fa-plus"></i> Add Supervisor</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Supervisor ID</th>
                        <th>Name</th>
                        <th>Contact Number</th>
                        <th>Assigned Train</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="supervisorsTableBody">
                    <!-- Data populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Supervisor Modal -->
    <div id="supervisorModal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" onclick="closeModal('supervisorModal')">&times;</span>
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Add New Supervisor</h2>
            <form id="supervisorForm" onsubmit="handleSupervisorSubmit(event)">
                <input type="hidden" id="Supervisor_ID">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="Name" required>
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" id="Contact_Number" required>
                </div>
                <div class="form-group">
                    <label>Assign Train (Optional)</label>
                    <select id="Assigned_Train_ID">
                        <option value="">None</option>
                        <!-- Populated dynamically -->
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Save Supervisor</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchSupervisors();
            loadSupervisorDropdowns();
        });
    </script>
</body>
</html>
