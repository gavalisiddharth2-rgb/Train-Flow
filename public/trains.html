<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Trains - TrainFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo"><i class="fa-solid fa-train"></i> TrainFlow</a>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="trains.html" class="active">Trains</a>
            <a href="passengers.html">Passengers</a>
            <a href="tickets.html">Tickets</a>
            <a href="supervisors.html">Supervisors</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Trains Directory</h1>
            <button class="btn btn-primary" onclick="openModal('trainModal')"><i class="fa-solid fa-plus"></i> Add Train</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Source</th>
                        <th>Destination</th>
                        <th>Departure</th>
                        <th>Arrival</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="trainsTableBody">
                    <!-- Data populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Train Modal -->
    <div id="trainModal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" onclick="closeModal('trainModal')">&times;</span>
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Add New Train</h2>
            <form id="trainForm" onsubmit="handleTrainSubmit(event)">
                <input type="hidden" id="Train_ID">
                <div class="form-group">
                    <label>Train Name</label>
                    <input type="text" id="Train_Name" required>
                </div>
                <div class="form-group">
                    <label>Source Station</label>
                    <input type="text" id="Source" required>
                </div>
                <div class="form-group">
                    <label>Destination Station</label>
                    <input type="text" id="Destination" required>
                </div>
                <div class="form-group">
                    <label>Departure Time</label>
                    <input type="datetime-local" id="Departure_Time" required>
                </div>
                <div class="form-group">
                    <label>Arrival Time</label>
                    <input type="datetime-local" id="Arrival_Time" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Save Train</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchTrains);
    </script>
</body>
</html>
