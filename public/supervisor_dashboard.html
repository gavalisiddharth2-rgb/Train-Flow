<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor Portal - TrainFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo"><i class="fa-solid fa-train"></i> TrainFlow <span style="font-size: 1rem; color: var(--text-secondary); margin-left: 10px;">Supervisor Portal</span></a>
        <div class="nav-links">
            <span id="welcomeUser" style="color: white; font-weight: bold; margin-right: 1rem;"></span>
            <button class="btn btn-sm btn-danger" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>My Assigned Train</h1>
        </div>

        <div id="noTrainMessage" style="display: none; text-align: center; margin-top: 5rem;">
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 4rem; color: var(--text-secondary); margin-bottom: 1rem;"></i>
            <h2>You currently have no train assigned.</h2>
            <p style="color: var(--text-secondary);">Please contact Train Management for assignments.</p>
        </div>

        <div id="trainDetailsCard" class="glass-card" style="display: none; max-width: 600px; margin: 0 auto; text-align: center;">
            <i class="fa-solid fa-train" style="font-size: 5rem; color: #6366f1; margin-bottom: 1.5rem;"></i>
            <h2 id="supTrainName" style="font-size: 2.5rem; margin-bottom: 1rem;">Train Name</h2>
            
            <div style="display: flex; justify-content: space-around; margin: 2rem 0; padding: 1.5rem; background: rgba(0,0,0,0.2); border-radius: 1rem;">
                <div>
                    <p style="color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase;">Source</p>
                    <h3 id="supTrainSource" style="font-size: 1.5rem; color: #14b8a6;">Source</h3>
                    <p id="supTrainDeparture" style="font-weight: bold;">00:00</p>
                </div>
                <div style="display: flex; align-items: center; color: var(--text-secondary);">
                    <i class="fa-solid fa-arrow-right-long" style="font-size: 2rem;"></i>
                </div>
                <div>
                    <p style="color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase;">Destination</p>
                    <h3 id="supTrainDestination" style="font-size: 1.5rem; color: #ec4899;">Destination</h3>
                    <p id="supTrainArrival" style="font-weight: bold;">00:00</p>
                </div>
            </div>
            
            <div style="color: #10b981; font-weight: bold; font-size: 1.2rem;">
                <i class="fa-solid fa-circle-check"></i> Status: Ready for Technical Inspection
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth('Supervisor');
            loadSupervisorDashboard();
        });
    </script>
</body>
</html>
