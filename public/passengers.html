<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Passengers - TrainFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo"><i class="fa-solid fa-train"></i> TrainFlow</a>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="trains.html">Trains</a>
            <a href="passengers.html" class="active">Passengers</a>
            <a href="tickets.html">Tickets</a>
            <a href="supervisors.html">Supervisors</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Passengers Directory</h1>
            <button class="btn btn-primary" onclick="openModal('passengerModal')"><i class="fa-solid fa-plus"></i> Add Passenger</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Contact Number</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="passengersTableBody">
                    <!-- Data populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Passenger Modal -->
    <div id="passengerModal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" onclick="closeModal('passengerModal')">&times;</span>
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Add New Passenger</h2>
            <form id="passengerForm" onsubmit="handlePassengerSubmit(event)">
                <input type="hidden" id="Passenger_ID">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="Name" required>
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="Age" required min="1" max="120">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="Gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" id="Contact_Number" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Save Passenger</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchPassengers);
    </script>
</body>
</html>
